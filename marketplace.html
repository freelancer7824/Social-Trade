<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite P2P Escrow System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; user-select: none; -webkit-touch-callout: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .premium-card { background: white; border-radius: 2rem; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.02); }
        .nav-active { color: #2563eb !important; background: #eff6ff; border-radius: 1.2rem; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .offline { background: #cbd5e1; }
        .blur-text { filter: blur(5px); user-select: none; transition: filter 0.3s; }
    </style>
</head>
<body class="pb-32" oncontextmenu="return false;">

    <button onclick="showCreateModal()" class="fixed bottom-28 right-8 z-40 bg-gray-900 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl border-4 border-white hover:bg-black transition-all">
        <i class="fas fa-plus"></i>
    </button>

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-5 flex justify-between items-center">
        <div>
            <p class="text-[8px] font-black text-gray-400 uppercase tracking-widest">Available Wallet</p>
            <h1 class="text-lg font-black italic">৳ <span id="userBalance">0.00</span></h1>
        </div>
        <div class="text-right">
            <p id="onlineStatusText" class="text-[8px] font-black uppercase text-gray-400">Connecting...</p>
            <div id="statusDot" class="status-dot offline float-right ml-2 mt-1"></div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-5 mt-6">
        <section id="marketTab" class="tab-content active space-y-6">
            <div id="marketContainer" class="space-y-6"></div>
        </section>

        <section id="notifTab" class="tab-content space-y-4">
            <h2 class="text-[10px] font-black text-rose-500 uppercase tracking-widest px-2 italic">Pending Actions</h2>
            <div id="notifContainer" class="space-y-4"></div>
        </section>

        <section id="msgTab" class="tab-content space-y-4">
            <h2 class="text-[10px] font-black text-blue-600 uppercase tracking-widest px-2 italic">Active Trades</h2>
            <div id="msgContainer" class="space-y-4"></div>
        </section>
    </main>

    <div id="createModal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 space-y-4">
            <h2 class="text-lg font-black uppercase">Create Listing</h2>
            <input id="postTitle" type="text" placeholder="Item Title (e.g. UC, Diamond)" class="w-full p-4 bg-gray-50 rounded-xl text-sm font-bold border border-gray-100 focus:outline-none focus:ring-2 focus:ring-black">
            <input id="postPrice" type="number" placeholder="Price per Piece (৳)" class="w-full p-4 bg-gray-50 rounded-xl text-sm font-bold border border-gray-100 focus:outline-none focus:ring-2 focus:ring-black">
            <input id="postPieces" type="number" placeholder="How many pieces to sell?" class="w-full p-4 bg-gray-50 rounded-xl text-sm font-bold border border-gray-100 focus:outline-none focus:ring-2 focus:ring-black">
            <input id="postLimit" type="number" placeholder="Time Limit (Hours)" class="w-full p-4 bg-gray-50 rounded-xl text-sm font-bold border border-gray-100 focus:outline-none focus:ring-2 focus:ring-black">
            <div class="relative">
                <textarea id="postSecretDesc" rows="3" placeholder="Secret Data / Description (Only buyer will see after payment)" class="w-full p-4 bg-red-50 rounded-xl text-xs font-bold border border-red-100 focus:outline-none focus:ring-2 focus:ring-rose-500"></textarea>
                <i class="fas fa-lock absolute top-4 right-4 text-rose-300"></i>
            </div>
            <button onclick="createListing()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-xl">Submit Listing</button>
            <button onclick="document.getElementById('createModal').style.display='none'" class="w-full bg-gray-100 text-gray-500 py-3 rounded-xl font-bold text-xs">Cancel</button>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 bg-white border border-gray-100 rounded-[2.5rem] p-2 flex justify-between items-center z-50 shadow-2xl">
        <button onclick="changeTab('market', this)" class="nav-btn nav-active flex-1 py-3 text-gray-400 flex flex-col items-center gap-1">
            <i class="fas fa-store text-lg"></i><span class="text-[8px] font-black uppercase">Market</span>
        </button>
        <button onclick="changeTab('notif', this)" class="nav-btn flex-1 py-3 text-gray-400 flex flex-col items-center gap-1">
            <i class="fas fa-bolt text-lg"></i><span class="text-[8px] font-black uppercase">Pending</span>
        </button>
        <button onclick="changeTab('msg', this)" class="nav-btn flex-1 py-3 text-gray-400 flex flex-col items-center gap-1">
            <i class="fas fa-comment-alt text-lg"></i><span class="text-[8px] font-black uppercase">Trades</span>
        </button>
    </nav>

    <script>
        document.onkeydown = (e) => {
            if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 73 || e.keyCode === 74)) return false;
            if (e.keyCode === 123) return false;
        };

        const firebaseConfig = {
            apiKey: "AIzaSyD1mn9MR9hyZ36Ce1lnGyJYmL6AHopScTA",
            authDomain: "social-media-5e6c8.firebaseapp.com",
            databaseURL: "https://social-media-5e6c8-default-rtdb.firebaseio.com/",
            projectId: "social-media-5e6c8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;
        let userRatingsCache = {};
        let liveTimers = []; // Store intervals to clear them later

        auth.onAuthStateChanged(user => { 
            if(user) { 
                currentUser = user; 
                updatePresence();
                init(); 
            } else {
                window.location.href = "login.html";
            }
        });

        function updatePresence() {
            const userRef = db.ref(`user-info/${currentUser.uid}`);
            userRef.update({ lastActive: Date.now() });
            setInterval(() => { userRef.update({ lastActive: Date.now() }); }, 30000);

            db.ref(`user-info/${currentUser.uid}/lastActive`).on('value', s => {
                const diff = Date.now() - s.val();
                const isOnline = diff < (3 * 60000); 
                document.getElementById('statusDot').className = `status-dot ${isOnline ? 'online' : 'offline'}`;
                document.getElementById('onlineStatusText').innerText = isOnline ? 'Active Now' : 'Offline';
            });
        }

        async function init() {
            db.ref(`user-info/${currentUser.uid}`).on('value', s => {
                const data = s.val();
                if(!data) return;
                if(data.isBlocked) {
                    document.body.innerHTML = `<div class='h-screen flex items-center justify-center bg-red-600 text-white font-black p-10 text-center uppercase'>Banned: Terms Violation</div>`;
                    return;
                }
                document.getElementById('userBalance').innerText = (data.balance || 0).toFixed(2);
            });
            preloadRatings();
            loadMarket();
            loadOrders();
        }

        async function preloadRatings() {
            db.ref('user-ratings').on('value', snap => {
                userRatingsCache = snap.val() || {};
                loadMarket(); 
            });
        }

        function getUserRatingStats(uid) {
            if (!userRatingsCache[uid]) return { avg: 0, total: 0, release: 100 };
            const ratings = Object.values(userRatingsCache[uid]);
            const total = ratings.length;
            const sum = ratings.reduce((a, b) => a + b.score, 0);
            const released = ratings.filter(r => r.released === true).length;
            return {
                avg: total > 0 ? (sum / total).toFixed(1) : 0,
                total: total,
                release: total > 0 ? Math.round((released / total) * 100) : 100
            };
        }

        function showCreateModal() { document.getElementById('createModal').style.display = 'flex'; }

        async function createListing() {
            const title = document.getElementById('postTitle').value.trim();
            const price = parseFloat(document.getElementById('postPrice').value);
            const pieces = parseInt(document.getElementById('postPieces').value);
            const limit = parseInt(document.getElementById('postLimit').value);
            const secretDesc = document.getElementById('postSecretDesc').value.trim();

            if(!title || !price || !pieces || !limit || !secretDesc) return Swal.fire('Error', 'All fields are required!', 'warning');

            await db.ref('market-items').push({
                title: title,
                pricePerPiece: price,
                pieces: pieces,
                totalPrice: price * pieces,
                reportTime: limit,
                secretDescription: secretDesc,
                publisherId: currentUser.uid,
                publisherType: 'Seller',
                timestamp: Date.now()
            });

            document.getElementById('createModal').style.display = 'none';
            document.getElementById('postTitle').value = '';
            document.getElementById('postPrice').value = '';
            document.getElementById('postPieces').value = '';
            document.getElementById('postLimit').value = '';
            document.getElementById('postSecretDesc').value = '';
            Swal.fire('Success', 'Listing Created!', 'success');
        }

        function loadMarket() {
            db.ref('market-items').on('value', snap => {
                const container = document.getElementById('marketContainer');
                container.innerHTML = "";
                const data = snap.val();
                if(!data) return;

                Object.keys(data).reverse().forEach(id => {
                    const gig = data[id];
                    const isOwn = gig.publisherId === currentUser.uid;
                    const stats = getUserRatingStats(gig.publisherId);

                    let starsHtml = '';
                    for(let i=1; i<=5; i++) {
                        starsHtml += `<i class="fas fa-star text-[8px] ${i <= Math.round(stats.avg) ? 'text-yellow-400' : 'text-gray-200'}"></i>`;
                    }

                    container.innerHTML += `
                        <div class="premium-card p-6 mb-6">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[8px] font-black ${isOwn ? 'bg-black text-white' : 'bg-blue-50 text-blue-600'} px-3 py-1 rounded-full uppercase italic">${isOwn ? 'My Listing' : gig.publisherType}</span>
                                ${!isOwn ? `
                                <div class="flex items-center gap-2 text-[9px] font-bold text-gray-500">
                                    ${starsHtml} <span class="text-black">(${stats.total})</span>
                                    <span class="bg-green-100 text-green-600 px-2 py-0.5 rounded-full text-[8px]">${stats.release}%</span>
                                </div>` : ''}
                            </div>
                            <h3 class="text-sm font-black text-gray-800 mb-2 uppercase italic">${gig.title}</h3>
                            
                            <div class="flex items-center gap-3 mb-4 bg-gray-50 p-2 rounded-lg text-center border border-gray-100">
                                <div class="flex-1">
                                    <p class="text-[8px] font-black text-gray-400 uppercase">Pieces</p>
                                    <p class="text-sm font-black text-gray-800">${gig.pieces || 1}</p>
                                </div>
                                <div class="flex-1 border-l border-gray-200">
                                    <p class="text-[8px] font-black text-gray-400 uppercase">Per Piece</p>
                                    <p class="text-sm font-black text-gray-800">৳${gig.pricePerPiece || gig.totalPrice}</p>
                                </div>
                            </div>

                            ${!isOwn ? `
                            <div class="bg-gray-50 p-3 rounded-xl mb-4 border border-gray-100 relative overflow-hidden">
                                <p class="text-[9px] font-black text-gray-400 uppercase mb-1"><i class="fas fa-lock mr-1"></i> Secret Data</p>
                                <p class="text-xs font-bold text-gray-800 blur-text">This is hidden secret description only visible after payment.</p>
                            </div>` : `
                            <div class="bg-red-50 p-3 rounded-xl mb-4 border border-red-100">
                                <p class="text-[9px] font-black text-rose-400 uppercase mb-1"><i class="fas fa-lock mr-1"></i> Your Secret Data</p>
                                <p class="text-xs font-bold text-rose-600">${gig.secretDescription}</p>
                            </div>`}

                            <div class="flex items-center justify-between p-4 bg-blue-50 rounded-2xl mb-2 border border-blue-100">
                                <div>
                                    <p class="text-[10px] font-black uppercase text-blue-800">Total Price</p>
                                    <p class="text-[8px] font-bold text-blue-400">${gig.reportTime}h Limit</p>
                                </div>
                                <p class="text-sm font-black text-blue-600">৳${gig.totalPrice}</p>
                            </div>
                            
                            ${isOwn ? `<button onclick="deletePost('${id}')" class="w-full mt-4 bg-rose-50 text-rose-500 py-3 rounded-xl font-black text-[9px] uppercase border border-rose-100">Delete Listing</button>` 
                                    : `<button onclick="startTrade('${id}', this)" class="w-full mt-4 bg-gray-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-xl">Confirm & Pay ৳${gig.totalPrice}</button>`}
                        </div>`;
                });
            });
        }

        async function deletePost(id) {
            if(confirm("Delete this listing?")) await db.ref(`market-items/${id}`).remove();
        }

        async function startTrade(gigId, btn) {
            btn.disabled = true; btn.innerText = "PROCESSING...";
            
            const gigSnap = await db.ref(`market-items/${gigId}`).get();
            if(!gigSnap.exists()) return Swal.fire('Error', 'Item no longer exists.', 'error');
            
            const gig = gigSnap.val();
            const totalPrice = gig.totalPrice;
            const timeLimit = gig.reportTime;
            const ownerId = gig.publisherId;

            const myBalSnap = await db.ref(`user-info/${currentUser.uid}/balance`).get();
            const myBal = myBalSnap.val() || 0;

            if(myBal < totalPrice) {
                btn.disabled = false; btn.innerText = `Confirm & Pay ৳${totalPrice}`;
                return Swal.fire('Low Balance', `৳${totalPrice} needed.`, 'error');
            }

            const { isConfirmed } = await Swal.fire({
                title: 'Confirm Purchase?',
                html: `<div class="text-[11px] text-left uppercase font-bold">Item: ${gig.title}<br>Pieces: ${gig.pieces || 1}<br>Total Amount: ৳${totalPrice}<br>Time Limit: ${timeLimit} Hours<br><br><span class="text-rose-500">৳${totalPrice} will be held in escrow until you release it.</span></div>`,
                showCancelButton: true
            });

            if(!isConfirmed) {
                btn.disabled = false; btn.innerText = `Confirm & Pay ৳${totalPrice}`;
                return;
            }

            try {
                await db.ref(`user-info/${currentUser.uid}/balance`).set(myBal - totalPrice);
                await db.ref(`market-items/${gigId}`).remove();

                await db.ref('orders').push({
                    buyerId: currentUser.uid,
                    sellerId: ownerId,
                    amount: totalPrice,
                    pieces: gig.pieces || 1,
                    title: gig.title,
                    secretDescription: gig.secretDescription,
                    deadline: Date.now() + (timeLimit * 3600000),
                    status: 'pending_seller',
                    timestamp: Date.now()
                });

                Swal.fire('Trade Active', 'Check Pending Tab.', 'success');
            } catch(e) {
                Swal.fire('Error', e.message, 'error');
                btn.disabled = false; btn.innerText = `Confirm & Pay ৳${totalPrice}`;
            }
        }

        // Helper function to calculate time ago
        function timeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if(seconds < 60) return `${seconds} sec ago`;
            const minutes = Math.floor(seconds / 60);
            if(minutes < 60) return `${minutes} min ago`;
            const hours = Math.floor(minutes / 60);
            if(hours < 24) return `${hours} hour ago`;
            const days = Math.floor(hours / 24);
            return `${days} day ago`;
        }

        // Helper function to calculate remaining time
        function timeRemaining(deadline) {
            const diff = deadline - Date.now();
            if(diff <= 0) return "Expired";
            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            return `${hours}h ${minutes}m ${seconds}s left`;
        }

        function loadOrders() {
            db.ref('orders').on('value', snap => {
                const notifBox = document.getElementById('notifContainer');
                const msgBox = document.getElementById('msgContainer');
                notifBox.innerHTML = ""; msgBox.innerHTML = "";
                
                // Clear previous live timers
                liveTimers.forEach(timer => clearInterval(timer));
                liveTimers = [];

                const val = snap.val();
                if(!val) return;

                Object.keys(val).forEach(id => {
                    const o = val[id];
                    
                    if(Date.now() > o.deadline && (o.status === 'pending_seller' || o.status === 'pending_buyer')) {
                        processExpiredTrade(id, o); 
                        return;
                    }

                    // SELLER VIEW: A buyer paid, waiting for seller to send info
                    if(o.sellerId === currentUser.uid && o.status === 'pending_seller') {
                        const div = document.createElement('div');
                        div.className = "premium-card p-6 border-l-4 border-rose-500";
                        div.innerHTML = `
                            <div class="flex justify-between items-center mb-2">
                                <p class="text-[8px] font-black uppercase text-rose-500">New Escrow Received</p>
                                <p class="text-[8px] font-bold text-gray-400 time-ago-text">Just now</p>
                            </div>
                            <h3 class="text-sm font-black text-gray-800 uppercase mb-1">${o.title || 'Item'}</h3>
                            <p class="text-[10px] font-bold text-gray-500 mb-1">Pieces: ${o.pieces || 1}</p>
                            <p class="text-xs font-black mb-2">Amount Held: ৳${o.amount}</p>
                            <p class="text-[9px] font-bold text-rose-400 mb-4 deadline-text">Calculating time...</p>
                            <button onclick="approveTrade('${id}')" class="w-full bg-black text-white py-3 rounded-xl text-[9px] font-black">APPROVE & REVEAL DATA</button>
                        `;
                        notifBox.appendChild(div);

                        // Update time ago and deadline live
                        const timer1 = setInterval(() => {
                            div.querySelector('.time-ago-text').innerText = timeAgo(o.timestamp);
                            div.querySelector('.deadline-text').innerText = timeRemaining(o.deadline);
                        }, 1000);
                        liveTimers.push(timer1);
                    }

                    // BUYER VIEW: Seller approved, waiting for buyer to confirm release or report
                    if(o.buyerId === currentUser.uid && o.status === 'pending_buyer') {
                        const div = document.createElement('div');
                        div.className = "premium-card p-6 bg-blue-50/30 border-l-4 border-blue-500";
                        div.innerHTML = `
                            <div class="flex justify-between items-center mb-2">
                                <p class="text-[8px] font-black text-blue-600 uppercase">Seller Released Info</p>
                                <p class="text-xs font-black text-blue-600">৳${o.amount}</p>
                            </div>
                            <div class="flex justify-between items-center mb-2">
                                <p class="text-[10px] font-bold text-gray-500">Pieces: ${o.pieces || 1}</p>
                                <p class="text-[8px] font-bold text-gray-400 time-ago-text">Just now</p>
                            </div>
                            <h3 class="text-sm font-black text-gray-800 uppercase mb-2">${o.title || 'Item'}</h3>
                            
                            <!-- Revealed Secret Data -->
                            <div class="bg-white p-4 rounded-xl text-[11px] mb-3 border shadow-sm">
                                <p class="text-[9px] font-black text-gray-400 uppercase mb-2"><i class="fas fa-unlock mr-1"></i> Secret Description</p>
                                <p class="font-bold text-gray-800">${o.secretDescription || 'No data provided.'}</p>
                            </div>

                            <p class="text-[9px] font-bold text-rose-500 mb-4 deadline-text">Calculating time...</p>

                            <div class="flex gap-2">
                                <button onclick="finalComplete('${id}', ${o.amount}, '${o.sellerId}')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl text-[9px] font-black">CONFIRM RELEASE</button>
                                <button onclick="rejectTrade('${id}')" class="flex-1 bg-rose-50 text-rose-600 py-4 rounded-2xl text-[9px] font-black">REPORT</button>
                            </div>
                        `;
                        msgBox.appendChild(div);

                        // Update time ago and deadline live
                        const timer2 = setInterval(() => {
                            div.querySelector('.time-ago-text').innerText = timeAgo(o.timestamp);
                            div.querySelector('.deadline-text').innerText = timeRemaining(o.deadline);
                        }, 1000);
                        liveTimers.push(timer2);
                    }
                });
            });
        }

        // Seller approves and the secret data is sent to buyer
        async function approveTrade(id) {
            await db.ref(`orders/${id}`).update({ status: 'pending_buyer' });
            Swal.fire('Approved!', 'Secret data sent to buyer.', 'success');
        }

        // Buyer confirms release -> Funds go to Seller
        async function finalComplete(id, amount, sellerId) {
            const { value: rating } = await Swal.fire({
                title: 'Rate this seller',
                html: `<div class="flex justify-center gap-2" id="swal-stars">
                    <i class="fas fa-star text-3xl text-yellow-400 cursor-pointer" data-score="1"></i>
                    <i class="fas fa-star text-3xl text-yellow-400 cursor-pointer" data-score="2"></i>
                    <i class="fas fa-star text-3xl text-yellow-400 cursor-pointer" data-score="3"></i>
                    <i class="fas fa-star text-3xl text-yellow-400 cursor-pointer" data-score="4"></i>
                    <i class="fas fa-star text-3xl text-yellow-400 cursor-pointer" data-score="5"></i>
                </div>`,
                showCancelButton: true,
                preConfirm: () => {
                    const activeStar = document.querySelector('#swal-stars .text-yellow-500');
                    return activeStar ? parseInt(activeStar.dataset.score) : 5;
                }
            });

            const score = rating || 5;

            const selBalSnap = await db.ref(`user-info/${sellerId}/balance`).get();
            await db.ref(`user-info/${sellerId}/balance`).set((selBalSnap.val() || 0) + amount);
            
            await db.ref(`user-ratings/${sellerId}`).push({ score: score, released: true, timestamp: Date.now() });
            await db.ref(`orders/${id}`).update({ status: 'completed' });
            Swal.fire('Success', 'Trade Finished & Funds Released.', 'success');
        }

        // Buyer reports Seller -> Buyer gets refund, Seller gets blocked
        async function rejectTrade(id) {
            const snap = await db.ref(`orders/${id}`).get();
            const o = snap.val();
            
            const bSnap = await db.ref(`user-info/${o.buyerId}/balance`).get();
            await db.ref(`user-info/${o.buyerId}/balance`).set((bSnap.val() || 0) + o.amount);

            await db.ref(`user-ratings/${o.sellerId}`).push({ score: 1, released: false, timestamp: Date.now() });
            await db.ref(`user-info/${o.sellerId}`).update({ isBlocked: true });
            
            await db.ref(`orders/${id}`).update({ status: 'rejected' });
            Swal.fire('Reported', 'Seller Banned & Your Balance Restored.', 'error');
        }

        // Auto penalty if time expires
        async function processExpiredTrade(id, o) {
            if(o.status === 'pending_seller') {
                const bSnap = await db.ref(`user-info/${o.buyerId}/balance`).get();
                await db.ref(`user-info/${o.buyerId}/balance`).set((bSnap.val() || 0) + o.amount);
                await db.ref(`user-info/${o.sellerId}`).update({ isBlocked: true });
                await db.ref(`orders/${id}`).update({ status: 'expired_seller_blocked' });
            } 
            else if(o.status === 'pending_buyer') {
                const sSnap = await db.ref(`user-info/${o.sellerId}/balance`).get();
                await db.ref(`user-info/${o.sellerId}/balance`).set((sSnap.val() || 0) + o.amount);
                await db.ref(`user-info/${o.buyerId}`).update({ isBlocked: true });
                await db.ref(`orders/${id}`).update({ status: 'expired_buyer_blocked' });
            }
        }

        function changeTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            btn.classList.add('nav-active');
        }

        document.addEventListener('click', function(e) {
            if(e.target.closest('#swal-stars i')) {
                const stars = e.target.closest('#swal-stars').querySelectorAll('i');
                const score = e.target.dataset.score;
                stars.forEach(s => {
                    s.classList.toggle('text-yellow-500', parseInt(s.dataset.score) <= score);
                    s.classList.toggle('text-yellow-400', parseInt(s.dataset.score) > score);
                });
            }
        });
    </script>
</body>
</html>
