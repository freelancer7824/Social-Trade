<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - SocialTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { user-select: none; -webkit-tap-highlight-color: transparent; background-color: #fff; overflow: hidden; font-family: sans-serif; }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .img-container { width: 220px; height: 280px; border-radius: 18px; overflow: hidden; background: #f0f0f0; cursor: pointer; border: 1px solid #eee; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; display: block; }

        #imgModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; }
        #imgModal img { max-width: 95%; max-height: 85%; border-radius: 8px; }

        .upload-loader { border: 2px solid #f3f3f3; border-top: 2px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .recording-active { color: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        audio { height: 35px; max-width: 200px; border-radius: 20px; }
        .typing-dots::after { content: '...'; animation: dots 1s steps(3, end) infinite; }
        @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
    </style>
</head>
<body class="max-w-[500px] mx-auto h-screen flex flex-col bg-white">

    <div class="p-4 border-b flex items-center gap-3 bg-white sticky top-0 z-10">
        <i class="fas fa-arrow-left text-blue-500 text-lg cursor-pointer p-1" onclick="window.history.back()"></i>
        <img id="headPic" class="w-10 h-10 rounded-full object-cover border" src="https://ui-avatars.com/api/?name=User">
        <div class="flex-1">
            <h2 id="headName" class="font-bold text-[15px] text-gray-900">Loading...</h2>
            <div id="headStatus" class="text-[10px] flex items-center gap-1 text-gray-400">
                <span id="statusDot" class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
                <span id="statusText">Checking...</span>
            </div>
        </div>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50"></div>

    <div id="voiceStatus" class="hidden px-4 py-3 bg-blue-50 text-blue-600 text-sm flex justify-between items-center border-t animate-pulse">
        <span class="flex items-center gap-2">
            <i class="fas fa-microphone text-red-500"></i> 
            Recording... <span id="timer" class="font-mono font-bold">0s</span>
        </span>
        <button onclick="stopAndCancel()" class="text-red-500 font-bold px-2">Cancel</button>
    </div>

    <div class="p-3 border-t bg-white flex gap-2 items-center">
        <label class="p-2 cursor-pointer active:scale-90 transition">
            <i class="fas fa-image text-blue-500 text-xl" id="camIcon"></i>
            <div id="uploadSpin" class="upload-loader hidden"></div>
            <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="uploadToCloudinary(this)">
        </label>
        
        <button id="voiceBtn" onclick="toggleRecording()" class="p-2 text-blue-500 active:scale-90 transition">
            <i class="fas fa-microphone text-xl"></i>
        </button>

        <input id="msgInput" type="text" placeholder="Aa" class="flex-1 bg-gray-100 rounded-full px-5 py-2.5 outline-none text-sm border focus:border-blue-300 transition" autocomplete="off" onkeypress="if(event.key==='Enter')sendMsg()" oninput="handleTyping()">
        
        <button onclick="sendMsg()" id="sendBtn" class="text-blue-500 p-2 font-bold active:scale-90 transition">
            <i class="fas fa-paper-plane text-xl"></i>
        </button>
    </div>

    <div id="imgModal" onclick="this.style.display='none'">
        <span class="absolute top-5 right-5 text-white text-2xl"><i class="fas fa-times"></i></span>
        <img id="fullImg" src="">
    </div>

    <script>
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dhvtgzy5x/auto/upload";
        const CLOUDINARY_PRESET = "Rosenews"; 

        const firebaseConfig = { 
            apiKey: "AIzaSyD1mn9MR9hyZ36Ce1lnGyJYmL6AHopScTA", 
            authDomain: "social-media-5e6c8.firebaseapp.com", 
            databaseURL: "https://social-media-5e6c8-default-rtdb.firebaseio.com/", 
            projectId: "social-media-5e6c8" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth();
        const urlParams = new URLSearchParams(window.location.search);
        const receiverId = urlParams.get('uid');
        let myUid = "", chatKey = "";

        // LOCAL STORAGE HELPERS
        const LS_CHAT_KEY = () => `chat_${chatKey}`;
        
        function cacheImage(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 80; canvas.height = 100;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    try {
                        const dataURL = canvas.toDataURL('image/webp', 0.6);
                        localStorage.setItem('img_' + url, dataURL);
                        resolve(dataURL);
                    } catch (e) { resolve(url); }
                };
                img.onerror = () => resolve(url);
                img.src = url;
            });
        }

        function getLocalChats() {
            const data = localStorage.getItem(LS_CHAT_KEY());
            return data ? JSON.parse(data) : {};
        }

        function saveLocalChats(chats) {
            try { localStorage.setItem(LS_CHAT_KEY(), JSON.stringify(chats)); } 
            catch(e) {
                clearOldImageCache();
                try { localStorage.setItem(LS_CHAT_KEY(), JSON.stringify(chats)); } catch(e2) {}
            }
        }

        function clearOldImageCache() {
            let itemsRemoved = 0;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('img_') && itemsRemoved < 10) {
                    localStorage.removeItem(key); itemsRemoved++; i--;
                }
            }
        }

        // VOICE VARIABLES
        let mediaRecorder, audioChunks = [], timerInterval, seconds = 0, isRecording = false, shouldUpload = false;
        let typingTimeout; // For typing indicator

        auth.onAuthStateChanged(user => {
            if (user && receiverId) {
                myUid = user.uid;
                chatKey = myUid < receiverId ? myUid + "_" + receiverId : receiverId + "_" + myUid;
                loadHeader();
                loadMessages();
                setupTypingListener();
                markMessagesAsSeen(); // New: Mark messages as seen when chat opens
            }
        });

        function loadHeader() {
            db.ref(`user-info/${receiverId}/profile`).on('value', s => {
                const u = s.val() || {};
                document.getElementById('headName').innerText = u.fullName || "User";
                document.getElementById('headPic').src = u.profilePic || 'https://ui-avatars.com/api/?name=User';
            });
            db.ref(`status/${receiverId}`).on('value', s => {
                const data = s.val();
                const isOnline = data && (data.state === 'online');
                document.getElementById('statusText').innerText = isOnline ? "Active now" : "Offline";
                document.getElementById('statusDot').className = `w-2.5 h-2.5 rounded-full ${isOnline ? 'bg-green-500 shadow-[0_0_5px_#22c55e]' : 'bg-gray-300'}`;
            });
        }

        // --- SMART MESSAGE LOADING (FIXED) ---
        function loadMessages() {
            const container = document.getElementById('messages');
            
            // 1. Load from LocalStorage instantly
            const localChats = getLocalChats();
            if (Object.keys(localChats).length > 0) {
                renderMessages(localChats);
            }

            // 2. Listen to Firebase using 'value' instead of 'child_added' (Prevents multiple renders)
            db.ref(`chats/${chatKey}`).on('value', async snap => {
                const firebaseChats = snap.val() || {};
                
                // Cache new images locally
                for (let key in firebaseChats) {
                    if (firebaseChats[key].type === 'image' && firebaseChats[key].text && !localStorage.getItem('img_' + firebaseChats[key].text)) {
                        await cacheImage(firebaseChats[key].text);
                    }
                }

                saveLocalChats(firebaseChats); // Update local storage
                renderMessages(firebaseChats);  // Render only once per database update
                markMessagesAsSeen(); // Check if there are unseen messages
            });
        }

        function renderMessages(msgs) {
            const container = document.getElementById('messages');
            const sortedMsgs = Object.values(msgs).sort((a, b) => a.timestamp - b.timestamp);
            
            // Check if user is at the bottom before rendering
            const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;
            
            container.innerHTML = sortedMsgs.map(m => {
                const isMe = m.senderId === myUid;
                let content = "";
                
                if(m.type === 'image') {
                    const cachedThumb = localStorage.getItem('img_' + m.text);
                    const fullImageUrl = m.text.includes('cloudinary.com') ? m.text.replace('/upload/', '/upload/q_auto,f_auto,w_600/') : m.text;
                    const imgSrc = cachedThumb || fullImageUrl;
                    content = `<div class="img-container" onclick="openFullImage('${fullImageUrl}')"><img src="${imgSrc}" loading="lazy"></div>`;
                } else if(m.type === 'voice') {
                    content = `<div class="flex items-center bg-white p-1 rounded-full shadow-sm border"><audio controls src="${m.text}"></audio></div>`;
                } else {
                    content = `<div class="px-4 py-2.5 rounded-2xl text-[14px] shadow-sm ${isMe ? 'bg-blue-600 text-white rounded-br-none' : 'bg-white text-gray-800 border border-gray-100 rounded-bl-none'}">${m.text}</div>`;
                }

                // Seen Tick Logic (✓✓)
                let seenTick = "";
                if(isMe) {
                    if(m.seen) {
                        seenTick = `<span class="text-[10px] text-blue-200 ml-1">✓✓</span>`;
                    } else {
                        seenTick = `<span class="text-[10px] text-blue-200 ml-1">✓</span>`;
                    }
                }

                return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}"><div class="max-w-[85%] flex flex-col ${isMe ? 'items-end' : 'items-start'}">${content}${isMe ? `<div class="mt-0.5 flex items-center text-gray-400 text-[10px]">${timeAgo(m.timestamp)} ${seenTick}</div>` : ''}</div></div>`;
            }).join('');
            
            // Auto-scroll only if user is already at the bottom
            if(isAtBottom) {
                container.scrollTop = container.scrollHeight;
            }
        }

        // --- NEW: MARK MESSAGES AS SEEN ---
        function markMessagesAsSeen() {
            db.ref(`chats/${chatKey}`).once('value', snap => {
                const messages = snap.val();
                const updates = {};
                for (let key in messages) {
                    // If message is from receiver and not seen yet
                    if (messages[key].senderId === receiverId && !messages[key].seen) {
                        updates[`${key}/seen`] = true;
                    }
                }
                if (Object.keys(updates).length > 0) {
                    db.ref(`chats/${chatKey}`).update(updates);
                }
            });
        }

        // --- NEW: TYPING INDICATOR ---
        function handleTyping() {
            clearTimeout(typingTimeout);
            db.ref(`typing/${chatKey}/${myUid}`).set(true);
            typingTimeout = setTimeout(() => {
                db.ref(`typing/${chatKey}/${myUid}`).remove();
            }, 1500);
        }

        function setupTypingListener() {
            db.ref(`typing/${chatKey}/${receiverId}`).on('value', snap => {
                const isTyping = snap.val() === true;
                const statusText = document.getElementById('statusText');
                if(isTyping) {
                    statusText.innerHTML = `<span class="text-blue-500 typing-dots">Typing</span>`;
                } else {
                    // Revert to original status check
                    db.ref(`status/${receiverId}`).once('value', s => {
                        const data = s.val();
                        statusText.innerText = (data && data.state === 'online') ? "Active now" : "Offline";
                    });
                }
            });
        }

        // Time formatter (Basic)
        function timeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if(seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if(minutes < 60) return minutes + 'm ago';
            const hours = Math.floor(minutes / 60);
            if(hours < 24) return hours + 'h ago';
            return new Date(timestamp).toLocaleDateString();
        }

        // VOICE LOGIC
        async function toggleRecording() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    startRecording(stream);
                } catch (err) { alert("Please allow microphone permission."); }
            } else { stopAndSend(); }
        }

        function startRecording(stream) {
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = []; isRecording = true; shouldUpload = true; seconds = 0;
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = async () => {
                if (shouldUpload && audioChunks.length > 0) {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    uploadAudio(audioBlob);
                }
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            document.getElementById('voiceStatus').classList.remove('hidden');
            document.getElementById('voiceBtn').classList.add('recording-active');
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = seconds + "s";
                if (seconds >= 60) stopAndSend();
            }, 1000);
        }

        function stopAndSend() {
            if (isRecording) { shouldUpload = true; isRecording = false; mediaRecorder.stop(); resetUI(); }
        }
        function stopAndCancel() {
            if (isRecording) { shouldUpload = false; isRecording = false; mediaRecorder.stop(); resetUI(); }
        }
        function resetUI() {
            clearInterval(timerInterval);
            document.getElementById('voiceStatus').classList.add('hidden');
            document.getElementById('voiceBtn').classList.remove('recording-active');
            document.getElementById('timer').innerText = "0s";
        }

        async function uploadAudio(blob) {
            const formData = new FormData();
            formData.append("file", blob); formData.append("upload_preset", CLOUDINARY_PRESET);
            try {
                const res = await fetch(CLOUDINARY_URL, { method: "POST", body: formData });
                const data = await res.json();
                if (data.secure_url) {
                    db.ref(`chats/${chatKey}`).push({ senderId: myUid, text: data.secure_url, type: 'voice', timestamp: Date.now(), seen: false });
                }
            } catch (e) { alert("Voice send failed!"); }
        }

        // TEXT & IMAGE LOGIC
        function sendMsg() {
            const input = document.getElementById('msgInput');
            const txt = input.value.trim();
            if (isRecording) { stopAndSend(); return; }
            if(!txt) return;
            
            db.ref(`chats/${chatKey}`).push({ senderId: myUid, text: txt, type: 'text', timestamp: Date.now(), seen: false });
            input.value = "";
            
            // Remove typing status immediately after sending
            db.ref(`typing/${chatKey}/${myUid}`).remove();
        }

        async function uploadToCloudinary(input) {
            if (!input.files[0]) return;
            document.getElementById('camIcon').classList.add('hidden');
            document.getElementById('uploadSpin').classList.remove('hidden');
            const formData = new FormData();
            formData.append("file", input.files[0]); formData.append("upload_preset", CLOUDINARY_PRESET);
            try {
                const res = await fetch(CLOUDINARY_URL, { method: "POST", body: formData });
                const data = await res.json();
                if (data.secure_url) {
                    db.ref(`chats/${chatKey}`).push({ senderId: myUid, text: data.secure_url, type: 'image', timestamp: Date.now(), seen: false });
                }
            } catch (e) { alert("Upload failed!"); }
            finally {
                document.getElementById('camIcon').classList.remove('hidden');
                document.getElementById('uploadSpin').classList.add('hidden');
                input.value = "";
            }
        }

        function openFullImage(url) {
            document.getElementById('fullImg').src = url;
            document.getElementById('imgModal').style.display = 'flex';
        }
    </script>
</body>
</html>
